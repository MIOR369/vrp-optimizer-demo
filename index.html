        // Inizializza mappa centrata su Terni
        const map = L.map('map').setView([42.5568, 12.6517], 10);
        
        // Tile layer OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        
        // Disegna TUTTI i percorsi
        Object.entries(fleetRoutes).forEach(([vehicleId, data]) => {
            // Polyline percorso
            L.polyline(data.routes, {
                color: data.color,
                weight: 2,
                opacity: 0.7
            }).addTo(map);
            
            // Markers fermate
            data.routes.forEach((coord, idx) => {
                L.circleMarker(coord, {
                    radius: 3,
                    fillColor: data.color,
                    fillOpacity: 0.8,
                    color: '#fff',
                    weight: 1
                }).bindPopup(`${vehicleId} - Stop ${idx + 1}`).addTo(map);
            });
        });
        
        // Fit bounds su tutti i punti
        const allCoords = Object.values(fleetRoutes).flatMap(v => v.routes);
        const bounds = L.latLngBounds(allCoords);
        map.fitBounds(bounds, { padding: [50, 50] });
